<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Video Player</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }
  </style>
</head>
<body>
    <video id="videoPlayer" controls style="width:100%; height:100%; background:black;"></video>
  
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10"></script>
    <script>
      const videoElement = document.getElementById("videoPlayer");
      const params = new URLSearchParams(window.location.search);
      const videoUrl = params.get("video");
  
      if (!videoUrl) {
        document.body.innerHTML = "<h2 style='color:white;text-align:center'>Видео не найдено</h2>";
      } else {
        const playButton = document.createElement('button');
        playButton.textContent = "▶ Нажмите для воспроизведения";
        playButton.style = `
          color:white; background:#333; padding:15px 25px;
          border:none; border-radius:8px; font-size:18px;
          position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
          cursor:pointer;
        `;
        document.body.appendChild(playButton);
  
        playButton.onclick = () => {
          playButton.remove();
          play(videoUrl);
        };
      }
  
      function play(url) {
        if (Hls.isSupported()) {
          const hls = new Hls();
          hls.loadSource(url);
          hls.attachMedia(videoElement);
          hls.on(Hls.Events.MANIFEST_PARSED, () => {
            videoElement.play().catch(err => console.warn("Autoplay blocked:", err));
          });
        } else if (videoElement.canPlayType("application/vnd.apple.mpegurl")) {
          videoElement.src = url;
          videoElement.play().catch(err => console.warn("Autoplay blocked:", err));
        }
      }
    </script>
  
</body>
</html>
