
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Переход к видео...</title>
</head>
<body>
    <div id="status">Загрузка плеера...</div>

   <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('video');

    if (videoUrl) {
        
        const vlcLink = `vlc://${videoUrl}`;;

    
        window.location.href = vlcLink;

        
        document.body.innerHTML = `<a href="${vlcLink}" style="font-size:24px;">Нажми здесь, чтобы запустить плеер</a>`;
    }
</script>
</body>
</html>
