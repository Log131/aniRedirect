
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Переход к видео...</title>
</head>
<body>
    <div id="status">Загрузка плеера...</div>

   <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('video');

    if (videoUrl) {
        const rawUrl = videoUrl.replace(/^https?:\/\//, '');
        
        
        const isHttps = videoUrl.startsWith('https');
        const scheme = isHttps ? 'https' : 'http';

        
        const intentLink = `intent://${rawUrl}#Intent;scheme=${scheme};end`;

    
        window.location.href = intentLink;

        
        document.body.innerHTML = `<a href="${intentLink}" style="font-size:24px;">Нажми здесь, чтобы запустить плеер</a>`;
    }
</script>
</body>
</html>
