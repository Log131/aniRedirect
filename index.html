<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Переход к видео...</title>
</head>
<body>
    <div id="status">Загрузка плеера...</div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');

        if (videoUrl) {
            const cleanUrl = videoUrl.replace(/^https?:\/\//, '');
            
            const intentLink = `intent://${cleanUrl}#Intent;scheme=https;end`;

            // Выполняем редирект
            window.location.href = intentLink;

            document.getElementById('status').innerHTML = 
                `<a href="${intentLink}">Нажмите здесь, чтобы открыть плеер</a>`;
        } else {
            document.getElementById('status').innerText = "Ошибка: Ссылка на видео не найдена.";
        }
    </script>
</body>
</html>
